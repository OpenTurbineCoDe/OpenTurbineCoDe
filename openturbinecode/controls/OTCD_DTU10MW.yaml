#  --------------------- ROSCO controller tuning input file -------------------
    # Written for use with ROSCO_Toolbox tuning procedures
    # Turbine: DTU 10MW Reference Wind Turbine
# ------------------------------ OpenFAST PATH DEFINITIONS ------------------------------
path_params:
  FAST_InputFile:    'DTU_10MW_NAUTILUS_GoM_A15_DLC1.2_Baseline.fst'                                                      # Name of *.fst file
  FAST_directory: 'DTU10MWAero15'    # Main OpenFAST model directory, where the *.fst lives 
  FAST_Baselinefile: 'DTU_10MW_NAUTILUS_GoM_A15_DLC1.2_Baseline.fst'        # Name of *.fst file
  # Optional
  rotor_performance_filename:  'Cp_Ct_Cq.DTU10MW.txt'                                # Filename for rotor performance text file (if it has been generated by ccblade already)
  # Stand alone aerodyn solver for C tables
  Single_aero_DrivFil:     'AeroDyn_StandAlone/driver.inp'   # Path for the stand alone aerodyn driver input
  Single_aero_Driver:     'aerodyn_driver'                                 # Path for the stand alone aerodyn driver
  Single_aero_OutFil:     'AeroDyn_StandAlone/DTU10Mw.out'   # Path for the stand alone aerodyn output
  bdffile: 'tacs_setup/DTU_10MW_RWT_blade3D_rotated_Single.bdf'            # the bdf file for using as the basic element file for tacs based ROM

# -------------------------------- TURBINE PARAMETERS ----------------------------------- 
turbine_params:
  rotor_inertia:      156348032.208         # Rotor inertia [kg m^2], {Available in Elastodyn .sum file}
  rated_rotor_speed:  1.0053                # Rated rotor speed [rad/s]
  v_min:              4.0                   # Cut-in wind speed [m/s] 
  v_rated:            11.4                  # Rated wind speed [m/s]
  v_max:              25.0                  # Cut-out wind speed [m/s], -- Does not need to be exact (JUST ASSUME FOR NOW)
  max_pitch_rate:     0.1745                # Maximum blade pitch rate [rad/s]
  max_torque_rate:    5000000.              # Maximum torque rate [Nm/s], {~1/4 VS_RtTq/s}
  rated_power:        10000000.             # Rated Power [W]
  bld_edgewise_freq:  4.519                 # Blade edgewise first natural frequency [rad/s]
  bld_flapwise_freq:  0.0                   # Blade flapwise first natural frequency [rad/s]
  # Optional 
  TSR_operational:    # None                # Desired below-rated operational tip speed ratio (Cp-maximizing TSR is used if not defined)
  # - should be defined if Fl_Mode = 1
  twr_freq:           # None                # Tower natural frequency [rad/s]
  ptfm_freq:          # None                # Platform natural frequency [rad/s]   
# -------------------------------- Bmode section ----------------------------------- 
BModes_params:
  BModes_directory: '/home/seager/Downloads/CCD_controller/Source/DTU10MWAero15/DTU10MW_ModeTracking'                   # Path for BModes analysis: Preconditions: BModes installed in system
  BModes_InputFile: 'DTU10MWBlade.bmi'                                                                                  # Main input file for BModes
  BModes_exe: '/home/seager/Downloads/CCD_controller/Source/Modetracking/BModes-master/install/bin/bmodes'                   # Path for BModes analysis: Preconditions: BModes installed in system
# -------------------------------- Blade_mass property ----------------------------------- 
Bld_mass:
  Bldmass_ref:       41732.347                # Blade mass of baseline model[kg]
  Rotormass_ref:     230717.041               # Rotor mass of baseline model[kg]
  Bldinertia_ref:    45671254.536             # Blade inertia with respect to rotor center#Bld_len: 
  LenBld:            86.4                     # Blade length [m]
  RotRadius:            89.2                     # Blade length [m]
#------------------------------- CONTROLLER PARAMETERS ----------------------------------
controller_params:
  # Controller flags 
  LoggingLevel:       1                     # {0: write no debug files, 1: write standard output .dbg-file, 2: write standard output .dbg-file and complete avrSWAP-array .dbg2-file
  F_LPFType:          1                     # {1: first-order low-pass filter, 2: second-order low-pass filter}, [rad/s] (currently filters generator speed and pitch control signals)
  F_NotchType:        0                     # Notch on the measured generator speed {0: disable, 1: enable} 
  IPC_ControlMode:    0                     # Turn Individual Pitch Control (IPC) for fatigue load reductions (pitch contribution) {0: off, 1: 1P reductions, 2: 1P+2P reductions}
  VS_ControlMode:     2                     # Generator torqe control mode in above rated conditions {0: constant torque, 1: constant power, 2: TSR tracking PI control}
  PC_ControlMode:     1                     # Blade pitch control mode {0: No pitch, fix to fine pitch, 1: active PI blade pitch control}
  Y_ControlMode:      0                     # Yaw control mode {0: no yaw control, 1: yaw rate control, 2: yaw-by-IPC}
  SS_Mode:            1                     # Setpoint Smoother mode {0: no setpoint smoothing, 1: introduce setpoint smoothing}
  WE_Mode:            2                     # Wind speed estimator mode {0: One-second low pass filtered hub height wind speed, 1: Immersion and Invariance Estimator 2: Extended Kalman Filter}
  PS_Mode:            0                     # Pitch saturation mode {0: no pitch saturation, 1: peak shaving, 2: Cp-maximizing pitch saturation, 3: peak shaving and Cp-maximizing pitch saturation}
  SD_Mode:            0                     # Shutdown mode {0: no shutdown procedure, 1: pitch to max pitch at shutdown}
  Fl_Mode:            0                     # Floating specific feedback mode {0: no nacelle velocity feedback, 1: nacelle velocity feedback}
  Flp_Mode:           0                       # Flap control mode {0: no flap control, 1: steady state flap angle, 2: Proportional flap control}
  # Optional - should be defined if Fl_Mode = 1
  twr_freq:           # None                # Tower natural frequency [rad/s]
  ptfm_freq:          # None                # Platform natural frequency [rad/s]         
# Controller parameters
  zeta_pc:            0.8                   # Pitch controller desired damping ratio [-]
  omega_pc:           0.3                   # Pitch controller desired natural frequency [rad/s]
  zeta_vs:            0.7                   # Torque controller desired damping ratio [-]
  omega_vs:           0.2                   # Torque controller desired natural frequency [rad/s]
  # Optional - these can be defined, but do not need to be
  max_pitch:          # None                  # Maximum pitch angle [rad], {default = 90 degrees}
  min_pitch:          # None                  # Minimum pitch angle [rad], {default = 0 degrees}
  vs_minspd:          # None                  # Minimum rotor speed [rad/s], {default = 0 rad/s}
  ss_cornerfreq:      # None                  # First order low-pass filter cornering frequency for setpoint smoother [rad/s]
  ss_vsgain:          # None                  # Torque controller setpoint smoother gain bias percentage [%, <= 1 ], {default = 100%}
  ss_pcgain:          # None                  # Pitch controller setpoint smoother gain bias percentage  [%, <= 1 ], {default = 0.1%}
  ps_percent:         # None                  # Percent peak shaving  [%, <= 1 ], {default = 80%}
  sd_maxpit:          # None                  # Maximum blade pitch angle to initiate shutdown [rad], {default = bld pitch at v_max}
  sd_cornerfreq:      # None                  # Cutoff Frequency for first order low-pass filter for blade pitch angle [rad/s], {default = 0.41888 ~ time constant of 15s}
  flp_maxpit:         # None                  # Maximum (and minimum) flap pitch angle [rad]
